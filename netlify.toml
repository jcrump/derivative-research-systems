# Netlify configuration for Derivative Research Systems
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # No framework — pure static HTML
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── Redirect rules ──────────────────────────────────────────────────────────

# Redirect /blog to /blog/index.html (trailing slash handling)
[[redirects]]
  from = "/blog"
  to   = "/blog/index.html"
  status = 200

# Redirect /insights → /blog (friendly alias)
[[redirects]]
  from = "/insights"
  to   = "/blog/index.html"
  status = 301

# ── Headers ─────────────────────────────────────────────────────────────────

# Security headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://static.cloudflareinsights.com https://app.squirrels.ai; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://app.squirrels.ai; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://app.squirrels.ai; connect-src 'self' https://formspree.io https://cloudflareinsights.com https://app.squirrels.ai https://api.squirrels.ai wss://app.squirrels.ai; frame-src 'self' https://app.squirrels.ai;"
# Cache static assets aggressively
[[headers]]
  for = "/blog/blog-registry.js"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"
